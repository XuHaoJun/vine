services:
  pgdb:
    image: pgvector/pgvector:pg16
    shm_size: 1g
    restart: always
    healthcheck:
      test: 'pg_isready -U user --dbname=postgres'
      interval: 1s
      timeout: 5s
      retries: 10
    ports:
      - 5533:5432
    environment:
      POSTGRES_USER: user
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: password
    command: |
      postgres
      -c wal_level=logical
      -c max_wal_senders=10
      -c max_replication_slots=5
      -c hot_standby=on
      -c max_connections=256
      -c log_error_verbosity=terse
      -c log_min_messages=fatal
      -c idle_in_transaction_session_timeout=300000
      -c statement_timeout=60000
      -c tcp_keepalives_idle=60
      -c tcp_keepalives_interval=10
      -c tcp_keepalives_count=3
    # for verbose logging when debugging (uncomment as needed):
      # -c log_error_verbosity=default
      # -c log_min_messages=info
      # -c log_statement=all
      # -c log_connections=on
      # -c log_disconnections=on
      # -c log_duration=on
      # -c log_line_prefix='%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
    volumes:
      - pgdb_data:/var/lib/postgresql/data
      - ./packages/db/src/:/docker-entrypoint-initdb.d

  migrate:
    image: oven/bun:1
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      pgdb:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app/packages/db/src
    environment:
      - RUN=1
      - ALLOW_MISSING_ENV=1
      - GIT_SHA=${GIT_SHA:-}
      - ZERO_UPSTREAM_DB=postgresql://user:password@pgdb:5432/postgres
      - ZERO_CVR_DB=postgresql://user:password@pgdb:5432/zero_cvr
      - ZERO_CHANGE_DB=postgresql://user:password@pgdb:5432/zero_cdb
    entrypoint: sh -c 'bunx --bun vite build --config vite.config.ts && bun run migrate-dist.js'

  zero:
    image: "rocicorp/zero:${ZERO_VERSION:-error-run-bun-tko-run-env-update}"
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgdb:
        condition: service_healthy
    volumes:
      - zero_data:/app
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ZERO_LOG_LEVEL: ${ZERO_LOG_LEVEL:-warn}
      ZERO_UPSTREAM_DB: postgresql://user:password@pgdb:5432/postgres
      ZERO_CVR_DB: postgresql://user:password@pgdb:5432/zero_cvr
      ZERO_CHANGE_DB: postgresql://user:password@pgdb:5432/zero_cdb
      ZERO_MUTATE_URL: http://host.docker.internal:3001/api/zero/push
      ZERO_QUERY_URL: http://host.docker.internal:3001/api/zero/pull
      ZERO_ADMIN_PASSWORD: 'dev'
      ZERO_APP_PUBLICATIONS: ${ZERO_APP_PUBLICATIONS:-zero_takeout}
      ZERO_CVR_MAX_CONNS: ${ZERO_CVR_MAX_CONNS:-4}
      ZERO_MUTATE_FORWARD_COOKIES: ${ZERO_MUTATE_FORWARD_COOKIES:-true}
      ZERO_QUERY_FORWARD_COOKIES: ${ZERO_QUERY_FORWARD_COOKIES:-true}
      ZERO_NUM_SYNC_WORKERS: ${ZERO_NUM_SYNC_WORKERS:-4}
      ZERO_UPSTREAM_MAX_CONNS: ${ZERO_UPSTREAM_MAX_CONNS:-10}
    ports:
      - "${VITE_PORT_ZERO:-4948}:4848"

  server:
    image: oven/bun:1
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      pgdb:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app/apps/server
    env_file:
      - path: .env.docker-compose
        required: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      GIT_SHA: ${GIT_SHA:-}
      PORT: "3001"
    command: bun --watch --env-file=../../.env.docker-compose src/index.ts
    ports:
      - "3001:3001"

  web:
    image: oven/bun:1
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      - server
      - zero
    volumes:
      - .:/app
    working_dir: /app/apps/web
    env_file:
      - path: .env.docker-compose
        required: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      GIT_SHA: ${GIT_SHA:-}
      ONE_PORT: "3000"
      # Web talks to server via host.docker.internal in Docker
      ONE_SERVER_URL: "http://host.docker.internal:3001"
    command: bun run dev
    ports:
      - "3000:3000"

volumes:
  pgdb_data:
  zero_data:
