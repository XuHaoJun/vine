syntax = "proto3";
package stickerMarket.v1;

// --- MVP slice ---
service StickerMarketUserService {
  rpc CreateCheckout(CreateCheckoutRequest) returns (CreateCheckoutResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc FollowCreator(FollowCreatorRequest) returns (FollowCreatorResponse);
  rpc UnfollowCreator(UnfollowCreatorRequest) returns (UnfollowCreatorResponse);
  rpc UpsertStickerPackageReview(UpsertStickerPackageReviewRequest) returns (UpsertStickerPackageReviewResponse);
  rpc DeleteStickerPackageReview(DeleteStickerPackageReviewRequest) returns (DeleteStickerPackageReviewResponse);
  rpc ListLaunchNotifications(ListLaunchNotificationsRequest) returns (ListLaunchNotificationsResponse);
  rpc MarkLaunchNotificationRead(MarkLaunchNotificationReadRequest) returns (MarkLaunchNotificationReadResponse);
}

// --- Public discovery (no auth required) ---
service StickerMarketDiscoveryService {
  rpc GetStoreHome(GetStoreHomeRequest) returns (GetStoreHomeResponse);
  rpc SearchStickerPackages(SearchStickerPackagesRequest) returns (SearchStickerPackagesResponse);
  rpc GetStickerPackageDetail(GetStickerPackageDetailRequest) returns (GetStickerPackageDetailResponse);
  rpc GetCreatorPublicProfile(GetCreatorPublicProfileRequest) returns (GetCreatorPublicProfileResponse);
}

service StickerMarketAdminService {
  rpc RefundOrder(RefundOrderRequest) returns (RefundOrderResponse);
  rpc ReconcileStickerOrders(ReconcileStickerOrdersRequest) returns (ReconcileStickerOrdersResponse);
  rpc ListStickerReviewQueue(ListStickerReviewQueueRequest) returns (ListStickerReviewQueueResponse);
  rpc GetStickerReviewDetail(GetStickerReviewDetailRequest) returns (GetStickerReviewDetailResponse);
  rpc ApproveStickerPackage(ApproveStickerPackageRequest) returns (ApproveStickerPackageResponse);
  rpc RejectStickerPackage(RejectStickerPackageRequest) returns (RejectStickerPackageResponse);
  rpc ListPayoutRequests(ListPayoutRequestsRequest) returns (ListPayoutRequestsResponse);
  rpc ApprovePayoutRequest(ApprovePayoutRequestRequest) returns (ApprovePayoutRequestResponse);
  rpc RejectPayoutRequest(RejectPayoutRequestRequest) returns (RejectPayoutRequestResponse);
  rpc CreatePayoutBatch(CreatePayoutBatchRequest) returns (CreatePayoutBatchResponse);
  rpc ExportPayoutBatch(ExportPayoutBatchRequest) returns (ExportPayoutBatchResponse);
  rpc MarkPayoutPaid(MarkPayoutPaidRequest) returns (MarkPayoutPaidResponse);
  rpc MarkPayoutFailed(MarkPayoutFailedRequest) returns (MarkPayoutFailedResponse);
  rpc ListFeaturedShelves(ListFeaturedShelvesRequest) returns (ListFeaturedShelvesResponse);
  rpc UpsertFeaturedShelf(UpsertFeaturedShelfRequest) returns (UpsertFeaturedShelfResponse);
  rpc PublishFeaturedShelf(PublishFeaturedShelfRequest) returns (PublishFeaturedShelfResponse);
  rpc ArchiveFeaturedShelf(ArchiveFeaturedShelfRequest) returns (ArchiveFeaturedShelfResponse);
}

enum RefundStatus {
  REFUND_STATUS_UNSPECIFIED = 0;
  REFUND_STATUS_REFUND_PENDING = 1;
  REFUND_STATUS_REFUNDED = 2;
  REFUND_STATUS_REFUND_FAILED = 3;
}

message RefundOrderRequest {
  string order_id = 1;
  string reason = 2;
}

message RefundOrderResponse {
  string order_id = 1;
  RefundStatus status = 2;
  bool simulated = 3;
  string failure_reason = 4;
}

message ReconcileStickerOrdersRequest {
  string since_iso = 1;
  int32 limit = 2;
  bool dry_run = 3;
}

message ReconciliationMismatch {
  string order_id = 1;
  string local_status = 2;
  string connector_status = 3;
  string action = 4;
  string reason = 5;
}

message ReconcileStickerOrdersResponse {
  int32 checked = 1;
  int32 matched = 2;
  repeated ReconciliationMismatch mismatches = 3;
}

// --- Shared types ---
message Money {
  int32 minor_amount = 1;
  string currency = 2;
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_CREATED = 1;
  ORDER_STATUS_PAID = 2;
  ORDER_STATUS_FAILED = 3;
  ORDER_STATUS_REFUND_PENDING = 4;
  ORDER_STATUS_REFUNDED = 5;
  ORDER_STATUS_REFUND_FAILED = 6;
}

message RedirectFormPost {
  string target_url = 1;
  map<string, string> form_fields = 2;
}

// --- Requests / Responses ---
message CreateCheckoutRequest {
  string package_id = 1;
  bool simulate_paid = 2;  // dev-only; server rejects when PAYMENTS_ECPAY_MODE != 'stage'
}

message CreateCheckoutResponse {
  string order_id = 1;
  RedirectFormPost redirect = 2;
}

message GetOrderRequest { string order_id = 1; }

message GetOrderResponse {
  string order_id = 1;
  OrderStatus status = 2;
  string failure_reason = 3;
  int32 amount_minor = 4;
  string currency = 5;
}

service StickerMarketCreatorService {
  rpc GetCreatorProfile(GetCreatorProfileRequest) returns (GetCreatorProfileResponse);
  rpc UpsertCreatorProfile(UpsertCreatorProfileRequest) returns (UpsertCreatorProfileResponse);
  rpc CreateStickerPackageDraft(CreateStickerPackageDraftRequest) returns (CreateStickerPackageDraftResponse);
  rpc UpdateStickerPackageDraft(UpdateStickerPackageDraftRequest) returns (UpdateStickerPackageDraftResponse);
  rpc UploadStickerPackageAssets(UploadStickerPackageAssetsRequest) returns (UploadStickerPackageAssetsResponse);
  rpc SubmitStickerPackageReview(SubmitStickerPackageReviewRequest) returns (SubmitStickerPackageReviewResponse);
  rpc PublishApprovedStickerPackage(PublishApprovedStickerPackageRequest) returns (PublishApprovedStickerPackageResponse);
  rpc GetCreatorSalesReport(GetCreatorSalesReportRequest) returns (GetCreatorSalesReportResponse);
  rpc GetCreatorPayoutOverview(GetCreatorPayoutOverviewRequest) returns (GetCreatorPayoutOverviewResponse);
  rpc UpsertCreatorPayoutAccount(UpsertCreatorPayoutAccountRequest) returns (UpsertCreatorPayoutAccountResponse);
  rpc RequestCreatorPayout(RequestCreatorPayoutRequest) returns (RequestCreatorPayoutResponse);
}

enum StickerPackageStatus {
  STICKER_PACKAGE_STATUS_UNSPECIFIED = 0;
  STICKER_PACKAGE_STATUS_DRAFT = 1;
  STICKER_PACKAGE_STATUS_IN_REVIEW = 2;
  STICKER_PACKAGE_STATUS_APPROVED = 3;
  STICKER_PACKAGE_STATUS_REJECTED = 4;
  STICKER_PACKAGE_STATUS_ON_SALE = 5;
  STICKER_PACKAGE_STATUS_UNLISTED = 6;
  STICKER_PACKAGE_STATUS_REMOVED = 7;
}

message CreatorProfile {
  string id = 1;
  string user_id = 2;
  string display_name = 3;
  string country = 4;
  string bio = 5;
  string status = 6;
}

message StickerAssetValidationItem {
  string file_name = 1;
  int32 number = 2;
  string level = 3;
  string code = 4;
  string message = 5;
  int32 width = 6;
  int32 height = 7;
  int32 size_bytes = 8;
}

message StickerPackageDraft {
  string id = 1;
  string creator_id = 2;
  string name = 3;
  string description = 4;
  int32 price_minor = 5;
  string currency = 6;
  int32 sticker_count = 7;
  StickerPackageStatus status = 8;
  string tags_json = 9;
  string copyright_text = 10;
  bool auto_publish = 11;
  string cover_drive_key = 12;
  string tab_icon_drive_key = 13;
  string review_reason_category = 14;
  string review_reason_text = 15;
  string review_suggestion = 16;
  repeated int32 review_problem_asset_numbers = 17;
}

message StickerAsset {
  string id = 1;
  int32 number = 2;
  string drive_key = 3;
  int32 width = 4;
  int32 height = 5;
  int32 size_bytes = 6;
  string mime_type = 7;
}

message GetCreatorProfileRequest {}
message GetCreatorProfileResponse { CreatorProfile profile = 1; }

message UpsertCreatorProfileRequest {
  string display_name = 1;
  string country = 2;
  string bio = 3;
}
message UpsertCreatorProfileResponse { CreatorProfile profile = 1; }

message CreateStickerPackageDraftRequest {
  string name = 1;
  string description = 2;
  int32 price_minor = 3;
  int32 sticker_count = 4;
  string tags_json = 5;
  string copyright_text = 6;
  bool license_confirmed = 7;
  bool auto_publish = 8;
}
message CreateStickerPackageDraftResponse { StickerPackageDraft package = 1; }

message UpdateStickerPackageDraftRequest {
  string package_id = 1;
  string name = 2;
  string description = 3;
  int32 price_minor = 4;
  int32 sticker_count = 5;
  string tags_json = 6;
  string copyright_text = 7;
  bool license_confirmed = 8;
  bool auto_publish = 9;
}
message UpdateStickerPackageDraftResponse { StickerPackageDraft package = 1; }

message UploadStickerPackageAssetsRequest {
  string package_id = 1;
  bytes zip_file = 2;
}
message UploadStickerPackageAssetsResponse {
  bool valid = 1;
  repeated StickerAssetValidationItem items = 2;
}

message SubmitStickerPackageReviewRequest { string package_id = 1; }
message SubmitStickerPackageReviewResponse { StickerPackageDraft package = 1; }

message PublishApprovedStickerPackageRequest { string package_id = 1; }
message PublishApprovedStickerPackageResponse { StickerPackageDraft package = 1; }

message GetCreatorSalesReportRequest {
  string month = 1;
}

message SalesReportSummary {
  int32 gross_sales_minor = 1;
  int32 confirmed_revenue_minor = 2;
  int32 sold_count = 3;
  int32 refunded_count = 4;
  int32 refunded_minor = 5;
  int32 refund_pending_count = 6;
  int32 refund_pending_minor = 7;
  string currency = 8;
}

message SalesReportDailyRow {
  string date = 1;
  int32 gross_sales_minor = 2;
  int32 confirmed_revenue_minor = 3;
  int32 sold_count = 4;
}

message SalesReportPackageRow {
  string package_id = 1;
  string package_name = 2;
  int32 gross_sales_minor = 3;
  int32 confirmed_revenue_minor = 4;
  int32 sold_count = 5;
  int32 refunded_count = 6;
}

message GetCreatorSalesReportResponse {
  string month = 1;
  SalesReportSummary summary = 2;
  repeated SalesReportDailyRow daily_rows = 3;
  repeated SalesReportPackageRow package_rows = 4;
}

message ListStickerReviewQueueRequest {
  int32 limit = 1;
}
message ListStickerReviewQueueResponse {
  repeated StickerPackageDraft packages = 1;
}

message GetStickerReviewDetailRequest { string package_id = 1; }
message GetStickerReviewDetailResponse {
  StickerPackageDraft package = 1;
  repeated StickerAssetValidationItem latest_validation = 2;
  repeated StickerAsset assets = 3;
}

message ApproveStickerPackageRequest { string package_id = 1; }
message ApproveStickerPackageResponse { StickerPackageDraft package = 1; }

message RejectStickerPackageRequest {
  string package_id = 1;
  string reason_category = 2;
  string reason_text = 3;
  string suggestion = 4;
  repeated int32 problem_asset_numbers = 5;
}
message RejectStickerPackageResponse { StickerPackageDraft package = 1; }

message CreatorPayoutBankAccountSummary {
  string id = 1;
  string bank_name = 2;
  string account_last4 = 3;
}

message CreatorPayoutHistoryRow {
  string id = 1;
  string status = 2;
  int32 net_amount_minor = 3;
  string currency = 4;
  string requested_at = 5;
  string paid_at = 6;
  string failure_reason = 7;
  string reject_reason = 8;
}

message GetCreatorPayoutOverviewRequest {}
message GetCreatorPayoutOverviewResponse {
  int32 available_net_amount_minor = 1;
  string currency = 2;
  CreatorPayoutBankAccountSummary bank_account = 3;
  repeated CreatorPayoutHistoryRow history = 4;
}

message UpsertCreatorPayoutAccountRequest {
  string legal_name = 1;
  string bank_code = 2;
  string bank_name = 3;
  string branch_name = 4;
  string account_number = 5;
  string account_number_confirmation = 6;
}

message UpsertCreatorPayoutAccountResponse {
  CreatorPayoutBankAccountSummary bank_account = 1;
}

message RequestCreatorPayoutRequest {}
message RequestCreatorPayoutResponse {
  string payout_request_id = 1;
  string status = 2;
}

message ListPayoutRequestsRequest { int32 limit = 1; }
message ListPayoutRequestsResponse { repeated CreatorPayoutHistoryRow requests = 1; }

message ApprovePayoutRequestRequest { string payout_request_id = 1; }
message ApprovePayoutRequestResponse { string status = 1; }

message RejectPayoutRequestRequest {
  string payout_request_id = 1;
  string reason = 2;
}
message RejectPayoutRequestResponse { string status = 1; }

message CreatePayoutBatchRequest { repeated string payout_request_ids = 1; }
message CreatePayoutBatchResponse { string batch_id = 1; }

message ExportPayoutBatchRequest { string batch_id = 1; }
message ExportPayoutBatchResponse {
  string file_name = 1;
  string content_type = 2;
  string csv = 3;
}

message MarkPayoutPaidRequest {
  string payout_request_id = 1;
  string bank_transaction_id = 2;
  string paid_at = 3;
}
message MarkPayoutPaidResponse { string status = 1; }

message MarkPayoutFailedRequest {
  string payout_request_id = 1;
  string reason = 2;
}
message MarkPayoutFailedResponse { string status = 1; }

// --- Discovery messages ---

message GetStoreHomeRequest {}

message StoreHomeShelf {
  string id = 1;
  string title = 2;
  repeated StickerPackageCard packages = 3;
}

message StickerPackageCard {
  string id = 1;
  string name = 2;
  string creator_id = 3;
  string creator_display_name = 4;
  string cover_url = 5;
  string sticker_type = 6;
  int32 sticker_count = 7;
  int32 price_minor = 8;
  string currency = 9;
  double average_rating = 10;
  int32 review_count = 11;
  bool owned = 12;
  int32 display_price_minor = 13;
  string display_currency = 14;
  string published_at = 15;
}

message GetStoreHomeResponse {
  repeated StoreHomeShelf featured_shelves = 1;
  StoreHomeShelf bestseller_7d = 2;
  StoreHomeShelf bestseller_30d = 3;
  StoreHomeShelf latest_releases = 4;
}

message SearchStickerPackagesRequest {
  string query = 1;
  string sticker_type = 2;
  int32 price_min = 3;
  int32 price_max = 4;
  bool owned_only = 5;
  string creator_id = 6;
  string locale = 7;
  string sort = 8;
  int32 page_size = 9;
  string page_token = 10;
}

message SearchStickerPackagesResponse {
  repeated StickerPackageCard results = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}

message GetStickerPackageDetailRequest {
  string package_id = 1;
}

message CreatorProfileSummary {
  string id = 1;
  string display_name = 2;
  string bio = 3;
  string avatar_url = 4;
  int32 follower_count = 5;
  bool followed_by_me = 6;
}

message ReviewSnippet {
  string id = 1;
  string user_id = 2;
  string user_display_name = 3;
  int32 rating = 4;
  string body = 5;
  string created_at = 6;
}

message RatingSummary {
  double average_rating = 1;
  int32 total_count = 2;
  ReviewSnippet current_user_review = 3;
}

message StickerPackageDetail {
  string id = 1;
  string name = 2;
  string description = 3;
  int32 price_minor = 4;
  string currency = 5;
  string cover_url = 6;
  string sticker_type = 7;
  int32 sticker_count = 8;
  string status = 9;
  string published_at = 10;
  repeated string tags = 11;
  bool owned = 12;
  CreatorProfileSummary creator = 13;
  RatingSummary rating = 14;
  repeated ReviewSnippet recent_reviews = 15;
  repeated StickerPackageCard same_creator_packages = 16;
  int32 display_price_minor = 17;
  string display_currency = 18;
}

message GetStickerPackageDetailResponse {
  StickerPackageDetail package = 1;
}

message GetCreatorPublicProfileRequest {
  string creator_id = 1;
}

message GetCreatorPublicProfileResponse {
  CreatorProfileSummary profile = 1;
  repeated StickerPackageCard packages = 2;
}

// --- Follow / review messages ---

message FollowCreatorRequest { string creator_id = 1; }
message FollowCreatorResponse {}

message UnfollowCreatorRequest { string creator_id = 1; }
message UnfollowCreatorResponse {}

message UpsertStickerPackageReviewRequest {
  string package_id = 1;
  int32 rating = 2;
  string body = 3;
}
message UpsertStickerPackageReviewResponse { ReviewSnippet review = 1; }

message DeleteStickerPackageReviewRequest { string package_id = 1; }
message DeleteStickerPackageReviewResponse {}

// --- Launch notification messages ---

message LaunchNotification {
  string id = 1;
  string creator_id = 2;
  string creator_display_name = 3;
  string package_id = 4;
  string package_name = 5;
  string cover_url = 6;
  string status = 7;
  string created_at = 8;
  string read_at = 9;
}

message ListLaunchNotificationsRequest { int32 page_size = 1; string page_token = 2; }
message ListLaunchNotificationsResponse {
  repeated LaunchNotification notifications = 1;
  string next_page_token = 2;
}

message MarkLaunchNotificationReadRequest { string notification_id = 1; }
message MarkLaunchNotificationReadResponse {}

// --- Admin featured shelf messages ---

message FeaturedShelf {
  string id = 1;
  string slug = 2;
  string title = 3;
  string status = 4;
  string starts_at = 5;
  string ends_at = 6;
  string created_by_user_id = 7;
  string created_at = 8;
  string updated_at = 9;
  repeated FeaturedShelfItem items = 10;
}

message FeaturedShelfItem {
  string id = 1;
  string shelf_id = 2;
  string package_id = 3;
  string package_name = 4;
  int32 position = 5;
}

message ListFeaturedShelvesRequest {}
message ListFeaturedShelvesResponse { repeated FeaturedShelf shelves = 1; }

message UpsertFeaturedShelfRequest {
  string id = 1;
  string slug = 2;
  string title = 3;
  repeated string package_ids = 4;
  string starts_at = 5;
  string ends_at = 6;
}
message UpsertFeaturedShelfResponse { FeaturedShelf shelf = 1; }

message PublishFeaturedShelfRequest { string id = 1; }
message PublishFeaturedShelfResponse { FeaturedShelf shelf = 1; }

message ArchiveFeaturedShelfRequest { string id = 1; }
message ArchiveFeaturedShelfResponse { FeaturedShelf shelf = 1; }
