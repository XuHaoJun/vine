syntax = "proto3";
package stickerMarket.v1;

// --- MVP slice ---
service StickerMarketUserService {
  rpc CreateCheckout(CreateCheckoutRequest) returns (CreateCheckoutResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
}

service StickerMarketAdminService {
  rpc RefundOrder(RefundOrderRequest) returns (RefundOrderResponse);
  rpc ReconcileStickerOrders(ReconcileStickerOrdersRequest) returns (ReconcileStickerOrdersResponse);
}

enum RefundStatus {
  REFUND_STATUS_UNSPECIFIED = 0;
  REFUND_STATUS_REFUND_PENDING = 1;
  REFUND_STATUS_REFUNDED = 2;
  REFUND_STATUS_REFUND_FAILED = 3;
}

message RefundOrderRequest {
  string order_id = 1;
  string reason = 2;
}

message RefundOrderResponse {
  string order_id = 1;
  RefundStatus status = 2;
  bool simulated = 3;
  string failure_reason = 4;
}

message ReconcileStickerOrdersRequest {
  string since_iso = 1;
  int32 limit = 2;
  bool dry_run = 3;
}

message ReconciliationMismatch {
  string order_id = 1;
  string local_status = 2;
  string connector_status = 3;
  string action = 4;
  string reason = 5;
}

message ReconcileStickerOrdersResponse {
  int32 checked = 1;
  int32 matched = 2;
  repeated ReconciliationMismatch mismatches = 3;
}

// --- Shared types ---
message Money {
  int32 minor_amount = 1;
  string currency = 2;
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_CREATED = 1;
  ORDER_STATUS_PAID = 2;
  ORDER_STATUS_FAILED = 3;
}

message RedirectFormPost {
  string target_url = 1;
  map<string, string> form_fields = 2;
}

// --- Requests / Responses ---
message CreateCheckoutRequest {
  string package_id = 1;
  bool simulate_paid = 2;  // dev-only; server rejects when PAYMENTS_ECPAY_MODE != 'stage'
}

message CreateCheckoutResponse {
  string order_id = 1;
  RedirectFormPost redirect = 2;
}

message GetOrderRequest { string order_id = 1; }

message GetOrderResponse {
  string order_id = 1;
  OrderStatus status = 2;
  string failure_reason = 3;
  int32 amount_minor = 4;
  string currency = 5;
}
