syntax = "proto3";

package oa.v1;

// ── Enums ──

enum OAStatus {
  OA_STATUS_UNSPECIFIED = 0;
  OA_STATUS_ACTIVE = 1;
  OA_STATUS_DISABLED = 2;
}

enum WebhookStatus {
  WEBHOOK_STATUS_UNSPECIFIED = 0;
  WEBHOOK_STATUS_PENDING = 1;
  WEBHOOK_STATUS_VERIFIED = 2;
  WEBHOOK_STATUS_FAILED = 3;
}

enum AccessTokenType {
  ACCESS_TOKEN_TYPE_UNSPECIFIED = 0;
  ACCESS_TOKEN_TYPE_SHORT_LIVED = 1;
  ACCESS_TOKEN_TYPE_JWT_V21 = 2;
}

// ── Provider ──

message Provider {
  string id = 1;
  string name = 2;
  string owner_id = 3;
  string created_at = 4;
  string updated_at = 5;
}

message CreateProviderRequest {
  string name = 1;
}

message CreateProviderResponse {
  Provider provider = 1;
}

message GetProviderRequest {
  string id = 1;
}

message GetProviderResponse {
  Provider provider = 1;
}

message UpdateProviderRequest {
  string id = 1;
  optional string name = 2;
}

message UpdateProviderResponse {
  Provider provider = 1;
}

message DeleteProviderRequest {
  string id = 1;
}

message DeleteProviderResponse {}

message ListMyProvidersRequest {}

message ListMyProvidersResponse {
  repeated Provider providers = 1;
}

message ListProviderAccountsRequest {
  string provider_id = 1;
}

message ListProviderAccountsResponse {
  repeated OfficialAccount accounts = 1;
}

message ListMyOfficialAccountsRequest {}

message ListMyOfficialAccountsResponse {
  repeated OfficialAccount accounts = 1;
}

// ── Official Account ──

message OfficialAccount {
  string id = 1;
  string provider_id = 2;
  string name = 3;
  string unique_id = 4;
  string description = 5;
  string image_url = 6;
  OAStatus status = 7;
  string created_at = 8;
  string updated_at = 9;
  string email = 10;
  string country = 11;
  string company = 12;
  string industry = 13;
}

message OfficialAccountSecret {
  string channel_secret = 1;
}

message CreateOfficialAccountRequest {
  string provider_id = 1;
  string name = 2;
  string unique_id = 3;
  optional string description = 4;
  optional string image_url = 5;
  optional string email = 6;
  optional string country = 7;
  optional string company = 8;
  optional string industry = 9;
}

message CreateOfficialAccountResponse {
  OfficialAccount account = 1;
}

message GetOfficialAccountRequest {
  string id = 1;
}

message GetOfficialAccountResponse {
  OfficialAccount account = 1;
}

message GetOfficialAccountSecretRequest {
  string id = 1;
}

message GetOfficialAccountSecretResponse {
  OfficialAccountSecret secret = 1;
}

message UpdateOfficialAccountRequest {
  string id = 1;
  optional string name = 2;
  optional string description = 3;
  optional string image_url = 4;
  optional OAStatus status = 5;
}

message UpdateOfficialAccountResponse {
  OfficialAccount account = 1;
}

message DeleteOfficialAccountRequest {
  string id = 1;
}

message DeleteOfficialAccountResponse {}

// ── Webhook ──

message Webhook {
  string id = 1;
  string official_account_id = 2;
  string url = 3;
  WebhookStatus status = 4;
  optional string last_verified_at = 5;
  string created_at = 6;
}

message SetWebhookRequest {
  string official_account_id = 1;
  string url = 2;
}

message SetWebhookResponse {
  Webhook webhook = 1;
}

message VerifyWebhookRequest {
  string official_account_id = 1;
}

message VerifyWebhookResponse {
  WebhookStatus status = 1;
}

message GetWebhookRequest {
  string official_account_id = 1;
}

message GetWebhookResponse {
  optional Webhook webhook = 1;
}

message WebhookSettings {
  optional Webhook webhook = 1;
  bool use_webhook = 2;
  bool webhook_redelivery_enabled = 3;
  bool error_statistics_enabled = 4;
  optional int32 last_verify_status_code = 5;
  optional string last_verify_reason = 6;
}

message GetWebhookSettingsRequest {
  string official_account_id = 1;
}

message GetWebhookSettingsResponse {
  WebhookSettings settings = 1;
}

message UpdateWebhookSettingsRequest {
  string official_account_id = 1;
  optional string url = 2;
  optional bool use_webhook = 3;
  optional bool webhook_redelivery_enabled = 4;
  optional bool error_statistics_enabled = 5;
}

message UpdateWebhookSettingsResponse {
  WebhookSettings settings = 1;
}

message VerifyWebhookEndpointRequest {
  string official_account_id = 1;
  optional string endpoint_override = 2;
}

message WebhookTestResult {
  bool success = 1;
  int32 status_code = 2;
  string reason = 3;
  string timestamp = 4;
}

message VerifyWebhookEndpointResponse {
  WebhookTestResult result = 1;
}

message ListWebhookDeliveriesRequest {
  string official_account_id = 1;
  int32 page_size = 2;
  optional string cursor = 3;
  optional string status_filter = 4;
}

message WebhookDeliverySummary {
  string id = 1;
  string webhook_event_id = 2;
  string event_type = 3;
  string status = 4;
  optional string reason = 5;
  optional string detail = 6;
  optional int32 response_status = 7;
  int32 attempt_count = 8;
  bool is_redelivery = 9;
  string created_at = 10;
  optional string last_attempted_at = 11;
  optional string delivered_at = 12;
}

message ListWebhookDeliveriesResponse {
  repeated WebhookDeliverySummary deliveries = 1;
  optional string next_cursor = 2;
}

message GetWebhookDeliveryRequest {
  string official_account_id = 1;
  string delivery_id = 2;
}

message WebhookDeliveryAttempt {
  string id = 1;
  int32 attempt_number = 2;
  bool is_redelivery = 3;
  string request_url = 4;
  optional int32 response_status = 5;
  optional string response_body_excerpt = 6;
  optional string reason = 7;
  optional string detail = 8;
  string started_at = 9;
  optional string completed_at = 10;
}

message GetWebhookDeliveryResponse {
  WebhookDeliverySummary delivery = 1;
  string payload_json = 2;
  repeated WebhookDeliveryAttempt attempts = 3;
}

message RedeliverWebhookRequest {
  string official_account_id = 1;
  string delivery_id = 2;
}

message RedeliverWebhookResponse {
  WebhookDeliverySummary delivery = 1;
}

message SendTestWebhookEventRequest {
  string official_account_id = 1;
  string text = 2;
}

message SendTestWebhookEventResponse {
  WebhookTestResult result = 1;
}

// ── Access Token ──

message AccessToken {
  string id = 1;
  string official_account_id = 2;
  string token = 3;
  AccessTokenType type = 4;
  optional string key_id = 5;
  optional string expires_at = 6;
  string created_at = 7;
}

message ListAccessTokensRequest {
  string official_account_id = 1;
  optional string key_id = 2;
}

message ListAccessTokensResponse {
  repeated AccessTokenSummary tokens = 1;
}

message AccessTokenSummary {
  string id = 1;
  AccessTokenType type = 2;
  optional string key_id = 3;
  optional string expires_at = 4;
  string created_at = 5;
}

message IssueAccessTokenRequest {
  string official_account_id = 1;
  AccessTokenType type = 2;
  optional string public_key = 3;
}

message IssueAccessTokenResponse {
  string access_token = 1;
  int32 expires_in = 2;
  string token_type = 3;
  optional string key_id = 4;
}

message RevokeAccessTokenRequest {
  string token_id = 1;
}

message RevokeAccessTokenResponse {}

message RevokeAllAccessTokensRequest {
  string official_account_id = 1;
  string key_id = 2;
}

message RevokeAllAccessTokensResponse {
  int32 revoked_count = 1;
}

// ── Messaging API Console ──

message GetMessagingApiQuotaSummaryRequest {
  string official_account_id = 1;
}

message GetMessagingApiQuotaSummaryResponse {
  string type = 1;
  optional int32 monthly_limit = 2;
  int32 total_usage = 3;
}

// ── Search ──

message SearchOfficialAccountsRequest {
  string query = 1;
}

message SearchOfficialAccountsResponse {
  repeated OfficialAccountSummary accounts = 1;
}

// ── Recommend ──

message RecommendOfficialAccountsRequest {
  int32 limit = 1;
}

message RecommendOfficialAccountsResponse {
  repeated OfficialAccountSummary accounts = 1;
}

// ── OA Friendship ──

message AddOAFriendRequest {
  string official_account_id = 1;
}

message AddOAFriendResponse {
  OAFriendship friendship = 1;
}

message RemoveOAFriendRequest {
  string official_account_id = 1;
}

message RemoveOAFriendResponse {}

message ListMyOAFriendsRequest {}

message ListMyOAFriendsResponse {
  repeated OAFriendship friendships = 1;
}

message IsOAFriendRequest {
  string official_account_id = 1;
}

message IsOAFriendResponse {
  bool is_friend = 1;
}

message OAFriendship {
  string id = 1;
  string official_account_id = 2;
  string oa_name = 3;
  string oa_image_url = 4;
  string status = 5;
  string created_at = 6;
}

message OfficialAccountSummary {
  string id = 1;
  string name = 2;
  string unique_id = 3;
  string description = 4;
  string image_url = 5;
}

// ── Resolve by uniqueId ──

message ResolveOfficialAccountRequest {
  string unique_id = 1;
}

message ResolveOfficialAccountResponse {
  OfficialAccountSummary account = 1;
}

// ── Flex Simulator ──

message SimulatorSendFlexMessageRequest {
  string flex_json = 1;
}

message SimulatorSendFlexMessageResponse {}

// ── Rich Menu (user-facing) ──

message RichMenuArea {
  message Bounds {
    int32 x = 1;
    int32 y = 2;
    int32 width = 3;
    int32 height = 4;
  }
  message Action {
    string type = 1;
    optional string label = 2;
    optional string uri = 3;
    optional string data = 4;
    optional string text = 5;
    optional string rich_menu_alias_id = 6;
    optional string input_option = 7;
    optional string display_text = 8;
  }
  Bounds bounds = 1;
  Action action = 2;
}

message RichMenuData {
  string rich_menu_id = 1;
  string name = 2;
  string chat_bar_text = 3;
  bool selected = 4;
  int32 size_width = 5;
  int32 size_height = 6;
  repeated RichMenuArea areas = 7;
}

message GetActiveRichMenuRequest {
  string official_account_id = 1;
}

message GetActiveRichMenuResponse {
  optional RichMenuData rich_menu = 1;
  optional bytes image = 2;
  optional string image_content_type = 3;
}

// ── Rich Menu (admin) ──

message RichMenuItem {
  string rich_menu_id = 1;
  string name = 2;
  string chat_bar_text = 3;
  bool selected = 4;
  int32 size_width = 5;
  int32 size_height = 6;
  repeated RichMenuArea areas = 7;
  bool has_image = 8;
}

message ListRichMenusRequest {
  string official_account_id = 1;
}

message ListRichMenusResponse {
  repeated RichMenuItem menus = 1;
  optional string default_rich_menu_id = 2;
}

message GetRichMenuRequest {
  string official_account_id = 1;
  string rich_menu_id = 2;
}

message GetRichMenuResponse {
  RichMenuItem menu = 1;
  optional bytes image = 2;
  optional string image_content_type = 3;
}

message CreateRichMenuRequest {
  string official_account_id = 1;
  string name = 2;
  string chat_bar_text = 3;
  bool selected = 4;
  int32 size_width = 5;
  int32 size_height = 6;
  repeated RichMenuArea areas = 7;
}

message CreateRichMenuResponse {
  string rich_menu_id = 1;
}

message UpdateRichMenuRequest {
  string official_account_id = 1;
  string rich_menu_id = 2;
  string name = 3;
  string chat_bar_text = 4;
  bool selected = 5;
  int32 size_width = 6;
  int32 size_height = 7;
  repeated RichMenuArea areas = 8;
}

message UpdateRichMenuResponse {}

message DeleteRichMenuRequest {
  string official_account_id = 1;
  string rich_menu_id = 2;
}

message DeleteRichMenuResponse {}

message SetDefaultRichMenuRequest {
  string official_account_id = 1;
  string rich_menu_id = 2;
}

message SetDefaultRichMenuResponse {}

message ClearDefaultRichMenuRequest {
  string official_account_id = 1;
}

message ClearDefaultRichMenuResponse {}

message UploadRichMenuImageRequest {
  string official_account_id = 1;
  string rich_menu_id = 2;
  bytes image = 3;
  string content_type = 4;
}

message UploadRichMenuImageResponse {}

// ── Service ──

service OAService {
  rpc ListMyProviders(ListMyProvidersRequest) returns (ListMyProvidersResponse);
  rpc CreateProvider(CreateProviderRequest) returns (CreateProviderResponse);
  rpc GetProvider(GetProviderRequest) returns (GetProviderResponse);
  rpc UpdateProvider(UpdateProviderRequest) returns (UpdateProviderResponse);
  rpc DeleteProvider(DeleteProviderRequest) returns (DeleteProviderResponse);
  rpc ListProviderAccounts(ListProviderAccountsRequest) returns (ListProviderAccountsResponse);
  rpc ListMyOfficialAccounts(ListMyOfficialAccountsRequest) returns (ListMyOfficialAccountsResponse);
  rpc CreateOfficialAccount(CreateOfficialAccountRequest) returns (CreateOfficialAccountResponse);
  rpc GetOfficialAccount(GetOfficialAccountRequest) returns (GetOfficialAccountResponse);
  rpc GetOfficialAccountSecret(GetOfficialAccountSecretRequest) returns (GetOfficialAccountSecretResponse);
  rpc UpdateOfficialAccount(UpdateOfficialAccountRequest) returns (UpdateOfficialAccountResponse);
  rpc DeleteOfficialAccount(DeleteOfficialAccountRequest) returns (DeleteOfficialAccountResponse);
  rpc SetWebhook(SetWebhookRequest) returns (SetWebhookResponse);
  rpc VerifyWebhook(VerifyWebhookRequest) returns (VerifyWebhookResponse);
  rpc GetWebhook(GetWebhookRequest) returns (GetWebhookResponse);
  rpc GetWebhookSettings(GetWebhookSettingsRequest) returns (GetWebhookSettingsResponse);
  rpc UpdateWebhookSettings(UpdateWebhookSettingsRequest) returns (UpdateWebhookSettingsResponse);
  rpc VerifyWebhookEndpoint(VerifyWebhookEndpointRequest) returns (VerifyWebhookEndpointResponse);
  rpc ListWebhookDeliveries(ListWebhookDeliveriesRequest) returns (ListWebhookDeliveriesResponse);
  rpc GetWebhookDelivery(GetWebhookDeliveryRequest) returns (GetWebhookDeliveryResponse);
  rpc RedeliverWebhook(RedeliverWebhookRequest) returns (RedeliverWebhookResponse);
  rpc SendTestWebhookEvent(SendTestWebhookEventRequest) returns (SendTestWebhookEventResponse);
  rpc IssueAccessToken(IssueAccessTokenRequest) returns (IssueAccessTokenResponse);
  rpc ListAccessTokens(ListAccessTokensRequest) returns (ListAccessTokensResponse);
  rpc RevokeAccessToken(RevokeAccessTokenRequest) returns (RevokeAccessTokenResponse);
  rpc RevokeAllAccessTokens(RevokeAllAccessTokensRequest) returns (RevokeAllAccessTokensResponse);
  rpc GetMessagingApiQuotaSummary(GetMessagingApiQuotaSummaryRequest) returns (GetMessagingApiQuotaSummaryResponse);
  rpc SearchOfficialAccounts(SearchOfficialAccountsRequest) returns (SearchOfficialAccountsResponse);
  rpc RecommendOfficialAccounts(RecommendOfficialAccountsRequest) returns (RecommendOfficialAccountsResponse);
  rpc AddOAFriend(AddOAFriendRequest) returns (AddOAFriendResponse);
  rpc RemoveOAFriend(RemoveOAFriendRequest) returns (RemoveOAFriendResponse);
  rpc ListMyOAFriends(ListMyOAFriendsRequest) returns (ListMyOAFriendsResponse);
  rpc IsOAFriend(IsOAFriendRequest) returns (IsOAFriendResponse);
  rpc ResolveOfficialAccount(ResolveOfficialAccountRequest) returns (ResolveOfficialAccountResponse);
  rpc SimulatorSendFlexMessage(SimulatorSendFlexMessageRequest) returns (SimulatorSendFlexMessageResponse);
  rpc GetActiveRichMenu(GetActiveRichMenuRequest) returns (GetActiveRichMenuResponse);
  rpc ListRichMenus(ListRichMenusRequest) returns (ListRichMenusResponse);
  rpc GetRichMenu(GetRichMenuRequest) returns (GetRichMenuResponse);
  rpc CreateRichMenu(CreateRichMenuRequest) returns (CreateRichMenuResponse);
  rpc UpdateRichMenu(UpdateRichMenuRequest) returns (UpdateRichMenuResponse);
  rpc DeleteRichMenu(DeleteRichMenuRequest) returns (DeleteRichMenuResponse);
  rpc SetDefaultRichMenu(SetDefaultRichMenuRequest) returns (SetDefaultRichMenuResponse);
  rpc ClearDefaultRichMenu(ClearDefaultRichMenuRequest) returns (ClearDefaultRichMenuResponse);
  rpc UploadRichMenuImage(UploadRichMenuImageRequest) returns (UploadRichMenuImageResponse);
}
